<div class="flex flex-wrap items-center justify-between gap-3 mb-8">
  <div>
    <h1
      class="text-3xl font-extrabold bg-linear-to-r from-slate-900 via-slate-700 to-slate-900 bg-clip-text text-transparent">
      Notifications Center</h1>
    <p class="text-[13px] text-black mt-1 font-medium">Manage platform-wide alerts and system messages</p>
  </div>
  <button class="bg-(--dd-blue) text-white font-bold text-[13px] px-6 py-2.5 rounded-full border-none cursor-pointer inline-flex items-center transition-all hover:bg-(--dd-blue-dark) shadow-lg shadow-(--dd-blue-light)/40" (click)="markAll()">
    <i class="bi bi-check2-all mr-2"></i> Mark All as Read
  </button>
</div>

<div class="flex flex-col gap-3 relative">
  <!-- Glow effect -->
  <div class="absolute -top-20 -left-20 w-40 h-40 bg-purple-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

  <div
    class="relative group bg-white p-5 rounded-3xl border border-gray-100 shadow-sm transition-all duration-300 hover:shadow-md hover:border-purple-100 flex items-start gap-4 overflow-hidden"
    *ngFor="let n of data.notifications"
    [class.bg-purple-50/20]="n.status === 'unread'"
  >
    <!-- Unread Indicator Strip -->
    <div class="absolute left-0 top-0 bottom-0 w-1 bg-(--dd-blue) transition-opacity duration-300" [class.opacity-0]="n.status !== 'unread'"></div>

    <div
      class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl shrink-0 transition-transform group-hover:scale-110 shadow-sm"
      [ngClass]="{
        'bg-blue-50 text-blue-500 border border-blue-100': n.type === 'info',
        'bg-green-50 text-green-600 border border-green-100': n.type === 'success',
        'bg-amber-50 text-amber-600 border border-amber-100': n.type === 'warning',
        'bg-rose-50 text-rose-600 border border-rose-100': n.type === 'error',
      }"
    >
      <i
        class="bi"
        [ngClass]="{
          'bi-info-circle-fill': n.type === 'info',
          'bi-check-circle-fill': n.type === 'success',
          'bi-exclamation-triangle-fill': n.type === 'warning',
          'bi-x-circle-fill': n.type === 'error',
        }"
      ></i>
    </div>
    
    <div class="flex-1">
      <div class="flex items-center justify-between gap-2 mb-1">
        <div class="flex items-center gap-2">
          <p class="text-[14px] font-bold text-slate-900 group-hover:text-(--dd-blue) transition-colors m-0">{{ n.title }}</p>
        </div>
        <p class="text-[12px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-lg border border-slate-100">{{ n.createdAt }}</p>
      </div>
      <p class="text-[12px] text-slate-500 leading-relaxed font-medium mt-1">{{ n.message }}</p>
      
      <div class="flex items-center gap-3 mt-3">
         <button class="text-[11px] font-bold text-purple-600 bg-purple-50 hover:bg-purple-100 border-none px-3 py-1 rounded-lg transition-colors cursor-pointer" *ngIf="n.status === 'unread'" (click)="n.status = 'read'">Mark Read</button>
         <button class="text-[11px] font-bold text-slate-400 hover:text-rose-500 bg-transparent border-none p-0 transition-colors cursor-pointer flex items-center gap-1">
            <i class="bi bi-trash"></i> Delete
         </button>
      </div>
    </div>
    
    <button class="w-8 h-8 rounded-xl border-none cursor-pointer flex items-center justify-center text-[13px] transition-all opacity-0 group-hover:opacity-100 bg-rose-50 text-rose-600 hover:bg-rose-100 hover:scale-110" title="Dismiss" (click)="n.status = 'read'">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
  
  <div *ngIf="data.notifications.length === 0" class="py-20 text-center bg-white rounded-3xl border border-dashed border-slate-200">
     <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
        <i class="bi bi-bell-slash text-4xl"></i>
     </div>
     <h3 class="text-slate-800 font-bold m-0">No notifications</h3>
     <p class="text-slate-400 text-sm mt-1">We'll alert you when something important happens.</p>
  </div>
</div>
