<app-stars-background>
  <div class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center overflow-hidden">
    
    <div class="relative z-20 max-w-2xl mx-auto flex flex-col items-center gap-8">
      
      <!-- Icon Container (Transparent) -->
      <div class="relative group">
        <div class="relative w-24 h-24 sm:w-32 sm:h-32 flex items-center justify-center">
          <i class="bi bi-gear-wide-connected text-4xl sm:text-6xl text-(--dd-blue) dark:text-(--dd-blue-light) animate-spin-slow"></i>
        </div>
      </div>

      <!-- Text Content -->
      <div class="space-y-4 font-sans">
        <h1 class="text-4xl sm:text-6xl font-bold tracking-tight text-slate-900 dark:text-white">
          Under <span class="bg-linear-to-r from-(--dd-blue-dark) to-(--dd-blue) bg-clip-text text-transparent">Maintenance</span>
        </h1>
        <p class="text-lg sm:text-xl text-slate-500 dark:text-neutral-400 font-medium max-w-md mx-auto leading-relaxed">
          We're currently fine-tuning the engines to provide you with a smoother, faster, and more robust experience.
        </p>
      </div>

      <!-- Progressive Loading Bar (Shadow Removed) -->
      <div class="w-full max-w-xs h-1.5 bg-slate-200 dark:bg-neutral-800 rounded-full overflow-hidden">
        <div class="h-full bg-linear-to-r from-(--dd-blue-dark) to-(--dd-blue) rounded-full animate-progress"></div>
      </div>

      <!-- Stats / Details (Optional Admin Info) -->
      <div *ngIf="settings" class="flex flex-wrap items-center justify-center gap-4 text-sm font-semibold">
        <div class="px-4 py-2 rounded-2xl bg-white/50 dark:bg-neutral-900/50 backdrop-blur-sm border border-slate-200/50 dark:border-neutral-800/50 text-slate-600 dark:text-neutral-300">
          Version: {{ settings.platformVersion }}
        </div>
        <div class="px-4 py-2 rounded-2xl bg-white/50 dark:bg-neutral-900/50 backdrop-blur-sm border border-slate-200/50 dark:border-neutral-800/50 text-slate-600 dark:text-neutral-300">
          Support: {{ settings.supportEmail }}
        </div>
      </div>

      <!-- Action Button (If Admin - Shadow Removed) -->
      <div *ngIf="isAdminView" class="pt-8">
        <button (click)="toggleMaintenance(false)" 
                class="px-8 py-4 rounded-3xl bg-(--dd-blue-dark) hover:bg-(--dd-blue) text-white font-bold hover:scale-105 transition-all active:scale-95">
          Return to Dashboard
        </button>
      </div>
    </div>

    <!-- Background Decoration Removed -->
  </div>
</app-stars-background>

<style>
  @keyframes progress {
    0% { width: 0%; transform: translateX(-100%); }
    50% { width: 40%; transform: translateX(50%); }
    100% { width: 100%; transform: translateX(100%); }
  }
  .animate-progress {
    animation: progress 3s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
  }
  .animate-spin-slow {
    animation: spin 8s linear infinite;
  }
  .animate-bounce-slow {
    animation: bounce 4s ease-in-out infinite;
  }
  .animation-delay-2000 {
    animation-delay: 2s;
  }
</style>
