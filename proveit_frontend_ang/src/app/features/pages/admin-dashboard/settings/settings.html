<div class="flex flex-wrap items-center justify-between gap-3 mb-8">
  <div>
    <h1
      class="text-3xl font-extrabold bg-linear-to-r from-slate-900 via-slate-700 to-slate-900 dark:from-white dark:via-neutral-300 dark:to-white bg-clip-text text-transparent">
      System Settings</h1>
    <p class="text-[13px] text-black dark:text-neutral-400 mt-1 font-medium">Control maintenance, registration and platform-wide defaults from one panel</p>
  </div>
  <div class="flex items-center gap-3">
    <!-- Theme Toggle -->
    <button type="button" (click)="theme.toggleWithTransition('horizontal')"
      class="group relative flex h-10 w-10 items-center justify-center rounded-2xl transition-all duration-200 focus:outline-none bg-white dark:bg-neutral-900 border border-slate-100 dark:border-neutral-800 shadow-sm hover:shadow-md"
      [attr.aria-label]="'Switch theme'">
      <i class="bi text-[18px] transition-transform duration-300 group-hover:rotate-[20deg]" [ngClass]="{
          'bi-sun-fill text-amber-500': !theme.isDark(),
          'bi-moon-stars-fill text-indigo-400': theme.isDark()
        }"></i>
    </button>
    <a routerLink="/admin/maintenance"
      class="px-6 py-2.5 rounded-full font-bold text-[13px] bg-slate-100 dark:bg-neutral-800 text-slate-700 dark:text-slate-300 no-underline hover:bg-slate-200 dark:hover:bg-neutral-700 transition-all flex items-center gap-2">
      <i class="bi bi-cpu"></i> Open Maintenance Page
    </a>
  </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <div class="bg-white dark:bg-neutral-900 rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-neutral-800 relative overflow-hidden group">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-50 rounded-full blur-3xl opacity-60"></div>

    <div class="flex items-center gap-3 mb-6 relative z-10">
      <div class="w-10 h-10 rounded-xl bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 flex items-center justify-center text-lg">
        <i class="bi bi-toggle-on"></i>
      </div>
      <h2 class="text-[16px] font-bold text-slate-900 dark:text-white">Platform Features</h2>
    </div>

    <div class="flex flex-col gap-4 relative z-10">
      <div class="flex items-center justify-between p-4 rounded-2xl bg-slate-50/50 dark:bg-neutral-800/30 border border-slate-100 dark:border-neutral-800 group/item hover:bg-white dark:hover:bg-neutral-800 hover:shadow-md hover:border-purple-100 dark:hover:border-purple-900/50 transition-all duration-300" *ngFor="let t of toggles">
        <div class="flex-1">
          <p class="text-[13px] font-bold text-slate-900 dark:text-white mb-0.5 group-hover/item:text-(--dd-blue) transition-colors">{{ t.label }}</p>
          <p class="text-[13px] text-slate-500 dark:text-neutral-400 max-w-[280px]">{{ t.desc }}</p>
        </div>
        <div class="toggle-switch transform scale-90 group-hover:scale-100 transition-transform" [class.on]="settings[t.key]" (click)="toggle(t.key)">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="bg-white dark:bg-neutral-900 rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-neutral-800 relative overflow-hidden group">
    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-50 rounded-full blur-3xl opacity-60"></div>

    <div class="flex items-center gap-3 mb-6 relative z-10">
      <div class="w-10 h-10 rounded-xl bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-lg">
        <i class="bi bi-gear-wide-connected"></i>
      </div>
      <h2 class="text-[16px] font-bold text-slate-900 dark:text-white">Core Configuration</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 relative z-10">
      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-bold text-slate-500 dark:text-neutral-400 ml-1">Max File Upload (MB)</label>
        <div class="relative">
          <i class="bi bi-file-earmark-arrow-up absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input class="w-full border-[1.5px] border-slate-100 dark:border-neutral-800 bg-slate-50 dark:bg-neutral-950 text-slate-900 dark:text-white rounded-2xl pl-11 pr-4 py-3 text-[13px] font-semibold outline-none transition-all focus:border-purple-500 focus:bg-white dark:focus:bg-neutral-900 focus:shadow-lg focus:shadow-purple-50" type="number" [(ngModel)]="settings.maxFileUploadMB" />
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-bold text-slate-500 dark:text-neutral-400 ml-1">Default Platform Plan</label>
        <div class="relative">
          <i class="bi bi-gem absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input class="w-full border-[1.5px] border-slate-100 dark:border-neutral-800 bg-slate-50 dark:bg-neutral-950 text-slate-900 dark:text-white rounded-2xl pl-11 pr-4 py-3 text-[13px] font-semibold outline-none transition-all focus:border-purple-500 focus:bg-white dark:focus:bg-neutral-900 focus:shadow-lg focus:shadow-purple-50" [(ngModel)]="settings.defaultPlan" />
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-bold text-slate-500 dark:text-neutral-400 ml-1">Primary Support Email</label>
        <div class="relative">
          <i class="bi bi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input class="w-full border-[1.5px] border-slate-100 dark:border-neutral-800 bg-slate-50 dark:bg-neutral-950 text-slate-900 dark:text-white rounded-2xl pl-11 pr-4 py-3 text-[13px] font-semibold outline-none transition-all focus:border-purple-500 focus:bg-white dark:focus:bg-neutral-900 focus:shadow-lg focus:shadow-purple-50" [(ngModel)]="settings.supportEmail" />
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-[13px] font-bold text-slate-500 dark:text-neutral-400 ml-1">System Version</label>
        <div class="relative">
          <i class="bi bi-cpu absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input class="w-full border-[1.5px] border-slate-100 dark:border-neutral-800 bg-slate-50/50 dark:bg-neutral-950/50 text-slate-400 dark:text-neutral-600 rounded-2xl pl-11 pr-4 py-3 text-[13px] font-bold cursor-not-allowed" [(ngModel)]="settings.platformVersion" readonly />
        </div>
      </div>
    </div>

    <div class="mt-6 flex flex-wrap items-center gap-3">
      <button class="px-5 py-3 rounded-2xl font-bold text-[14px] bg-slate-100 dark:bg-neutral-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-neutral-700 transition-colors"
        (click)="loadDefaults()">
        Restore Defaults
      </button>
      <button class="px-5 py-3 rounded-2xl font-bold text-[14px] bg-linear-to-r from-(--dd-blue) to-(--dd-blue-dark) text-white transition-all hover:scale-[1.01] hover:shadow-lg hover:shadow-(--dd-blue-light)/40 active:scale-95 shadow-md"
        [disabled]="isSaving"
        (click)="saveSettings()">
        {{ isSaving ? 'Saving...' : 'Save Settings' }}
      </button>
      <span *ngIf="saveState === 'success'" class="text-sm font-semibold text-emerald-600">System settings updated successfully.</span>
      <span *ngIf="saveState === 'error'" class="text-sm font-semibold text-rose-600">Could not update settings right now.</span>
    </div>
  </div>
</div>
