<div class="min-h-screen flex flex-col bg-(--dd-cream) selection:bg-(--dd-blue)/50 selection:text-white">
    <div class="grow">
        <header>
            <app-navbar
                [menus]="[{ label: 'Compitions', route: 'user/compition' }, { label: 'Company', route: 'user/company' }, { label: 'About', route: '/about' }]"></app-navbar>
        </header>

        <section class="mt-30 pb-20 px-4">
            <div class="max-w-5xl mx-auto">
                <button [routerLink]="['/user/compition', competitionId]"
                    class="flex items-center gap-2 text-slate-500 hover:text-(--dd-blue) transition-colors font-medium mb-6">
                    <i class="bi bi-arrow-left"></i> Back to Competition
                </button>

                <div class="mb-10 text-center md:text-left">
                    <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">
                        Submit Your Project <span *ngIf="competition" class="text-(--dd-blue)"><br/>for {{ competition.title }}</span>
                    </h1>
                    <p class="text-slate-500 mt-2 text-[15px]">A compact submission form built for quick demo runs.</p>
                </div>

                <div class="p-6 md:p-10 relative overflow-hidden">
                    <div
                        class="absolute top-0 right-0 w-64 h-64 bg-linear-to-bl from-blue-50/80 to-transparent rounded-bl-full pointer-events-none -mr-10 -mt-10">
                    </div>

                    <form [formGroup]="submissionForm" (ngSubmit)="onSubmit()"
                        class="relative z-10 flex flex-col gap-8">
                        <div class="flex flex-col gap-6">
                            <h2
                                class="text-[18px] font-bold text-slate-800 flex items-center gap-2 pb-3 border-b border-slate-100">
                                <i class="bi bi-info-circle text-(--dd-blue)"></i> Basic Submission
                            </h2>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-700">Project Title <span class="text-rose-500">*</span></label>
                                <input type="text" formControlName="projectTitle"
                                    placeholder="e.g. AI Resume Screening System"
                                    class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:bg-white focus:border-(--dd-blue) focus:ring-4 focus:ring-(--dd-blue)/10 transition-all text-sm font-medium text-slate-900 placeholder:text-slate-400">
                            </div>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-700">Project Summary <span class="text-rose-500">*</span></label>
                                <textarea formControlName="shortDescription" rows="4"
                                    placeholder="Briefly describe what your project does and what the reviewer should check first."
                                    class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:bg-white focus:border-(--dd-blue) focus:ring-4 focus:ring-(--dd-blue)/10 transition-all text-sm font-medium text-slate-900 placeholder:text-slate-400 resize-none"></textarea>
                            </div>
                        </div>

                        <div class="flex flex-col gap-6">
                            <h2
                                class="text-[18px] font-bold text-slate-800 flex items-center gap-2 pb-3 border-b border-slate-100">
                                <i class="bi bi-link-45deg text-(--dd-blue)"></i> Submission Links
                            </h2>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <label class="cursor-pointer relative">
                                    <input type="radio" formControlName="submissionType" value="GITHUB"
                                        class="peer sr-only">
                                    <div
                                        class="p-4 rounded-2xl border-2 border-slate-100 hover:border-[var(--dd-blue)] bg-white transition-all peer-checked:border-(--dd-blue) peer-checked:bg-blue-50/30 text-center text-slate-600 peer-checked:text-(--dd-blue)">
                                        <i class="bi bi-github text-xl mb-1 block"></i>
                                        <span class="text-[13px] font-bold block">GitHub Repo</span>
                                    </div>
                                </label>
                                <label class="cursor-pointer relative">
                                    <input type="radio" formControlName="submissionType" value="EXTERNAL_LINK"
                                        class="peer sr-only">
                                    <div
                                        class="p-4 rounded-2xl border-2 border-slate-100 hover:border-[var(--dd-blue)] bg-white transition-all peer-checked:border-(--dd-blue) peer-checked:bg-blue-50/30 text-center text-slate-600 peer-checked:text-(--dd-blue)">
                                        <i class="bi bi-link-45deg text-xl mb-1 block"></i>
                                        <span class="text-[13px] font-bold block">External Link</span>
                                    </div>
                                </label>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-bold text-slate-700">Main Submission Link <span class="text-rose-500">*</span></label>
                                    <input type="url" formControlName="submissionLink"
                                        placeholder="https://github.com/user/project or https://your-demo-link.com"
                                        class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:bg-white focus:border-(--dd-blue) focus:ring-4 focus:ring-(--dd-blue)/10 transition-all text-sm font-medium text-slate-900 placeholder:text-slate-400">
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-bold text-slate-700">Live Demo Link <span class="text-slate-400 font-normal ml-1">(Optional)</span></label>
                                    <input type="url" formControlName="liveDemoLink"
                                        placeholder="https://project-demo.com"
                                        class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:bg-white focus:border-(--dd-blue) focus:ring-4 focus:ring-(--dd-blue)/10 transition-all text-sm font-medium text-slate-900 placeholder:text-slate-400">
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-6">
                            <h2
                                class="text-[18px] font-bold text-slate-800 flex items-center gap-2 pb-3 border-b border-slate-100">
                                <i class="bi bi-braces text-(--dd-blue)"></i> Tech Stack
                            </h2>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-700">Technologies Used <span class="text-rose-500">*</span></label>
                                <input type="text" formControlName="techStack"
                                    placeholder="React, Node.js, MongoDB, Tailwind"
                                    class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:bg-white focus:border-(--dd-blue) focus:ring-4 focus:ring-(--dd-blue)/10 transition-all text-sm font-medium text-slate-900 placeholder:text-slate-400">
                            </div>
                        </div>

                        <div class="pt-6 border-t border-slate-100 flex items-center justify-end">
                            <button type="button" routerLink="/user/applications"
                                class="px-6 py-3 text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors mr-4">Cancel</button>

                            <button type="submit" [disabled]="isSubmitting"
                                class="px-8 py-3.5 rounded-full bg-linear-to-r from-(--dd-blue-dark) via-(--dd-blue) to-(--dd-blue) text-white font-bold shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:scale-[1.02] active:scale-95 transition-all text-[15px] flex items-center justify-center min-w-[200px] disabled:opacity-70 disabled:cursor-not-allowed">
                                <span *ngIf="!isSubmitting">Submit Project</span>
                                <app-morph-loading *ngIf="isSubmitting" size="xs" theme="light"></app-morph-loading>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="max-w-4xl mx-auto px-6 py-12 mt-12 mb-10 bg-white rounded-3xl shadow-sm border border-gray-100">
                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-bold text-gray-900 border-b-2 border-orange-400 inline-block pb-2">Submission Guidelines</h2>
                        <p class="text-gray-500 mt-2">A few quick tips so your demo submission still feels complete.</p>
                    </div>
                    <app-faq-accordion [items]="howItWorksItems"></app-faq-accordion>
                </div>
            </div>
        </section>
    </div>

    <app-footer></app-footer>
</div>
