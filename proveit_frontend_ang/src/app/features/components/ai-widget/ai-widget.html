<ng-container *ngIf="(user$ | async) && isVisible()">
    <!-- AI Widget Toggle Button -->
    <button (click)="toggleWidget()"
        class="fixed bottom-6 right-6 z-54 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300 hover:scale-110 active:scale-95 bg-gradient-to-br from-[var(--dd-blue-dark)] to-[var(--dd-blue)] group overflow-hidden"
        id="ai-widget-toggle">
        <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity"></div>

        <!-- Icon -->
        <svg *ngIf="!isOpen()" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white animate-pulse-gentle"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>

        <svg *ngIf="isOpen()" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>

    <!-- AI Widget Chat Window -->
    <div *ngIf="isOpen()" data-lenis-prevent
        class="fixed bottom-24 right-6 z-504 w-[350px] max-w-[calc(100vw-3rem)] h-[500px] max-h-[calc(100vh-8rem)] rounded-2xl overflow-hidden shadow-2xl flex flex-col bg-[var(--dd-cream)] dark:bg-black/10 backdrop-blur-xl border border-white/20 dark:border-[var(--dd-blue)]/20 animate-slide-up">
        <!-- Header -->
        <div
            class="p-4 bg-gradient-to-r from-[var(--dd-blue)]/80 to-[var(--dd-blue-dark)]/80 flex items-center justify-between">
            <div class="flex items-center gap-3 text-white">
                <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 100-2 1 1 0 000 2zm7-1a1 1 0 11-2 0 1 1 0 012 0zm-7.535 5.357a1 1 0 011.414-.044 3.933 3.933 0 005.242 0 1 1 0 011.37 1.455 5.933 5.933 0 01-7.982 0 1 1 0 01-.044-1.411z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-sm font-bold tracking-tight">ProveIt AI Assistant</h3>
                    <p class="text-[10px] text-white/70">Online & Ready to help</p>
                </div>
            </div>
            <button (click)="closeWidget()" class="text-white/60 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
 
        <!-- Messages Placeholder -->
        <div #scrollContainer data-lenis-prevent
            class="chat-messages-area flex-grow p-4 space-y-4 bg-[var(--dd-cream)]/10 dark:bg-gray-900/10">

            <ng-container *ngFor="let msg of messages()">
                <!-- AI Message -->
                <div *ngIf="msg.role === 'assistant'" class="flex flex-col gap-1 items-start">
                    <div class="bg-[var(--dd-blue)]/80 text-white rounded-2xl rounded-tl-none p-3 text-xs shadow-sm max-w-[85%] prose prose-invert prose-p:my-1 prose-headings:my-2 prose-sm break-words"
                        [innerHTML]="msg.content">
                    </div>
                    <span class="text-[10px] text-[var(--dd-blue)] ml-1 font-normal">AI Assistant • {{ msg.time |
                        date:'shortTime' }}</span>
                </div>

                <!-- User Message -->
                <div *ngIf="msg.role === 'user'" class="flex flex-col gap-1 items-end">
                    <div class="bg-gradient-to-r from-[var(--dd-blue-dark)] to-[var(--dd-blue)] text-white rounded-2xl rounded-tr-none p-3 text-xs shadow-sm max-w-[85%] prose prose-invert prose-p:my-1 prose-headings:my-2 prose-sm break-words"
                        [innerHTML]="msg.content">
                    </div>
                    <span class="text-[8px] text-[var(--dd-blue)] mr-1 font-medium">You • {{ msg.time | date:'shortTime'
                        }}</span>
                </div>
            </ng-container>

            <!-- Loading Indicator -->
            <div *ngIf="isLoading()" class="flex flex-col gap-1 items-start">
                <div
                    class="bg-[var(--dd-blue)]/60 text-white rounded-2xl rounded-tl-none p-4 text-sm shadow-sm w-16 flex items-center justify-center gap-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-white animate-bounce" style="animation-delay: 0ms"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-white animate-bounce" style="animation-delay: 150ms"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-white animate-bounce" style="animation-delay: 300ms"></div>
                </div>
            </div>

            <!-- Suggested Actions (only show if no user messages yet) -->
            <div *ngIf="messages().length === 1 && !isLoading()" class="pt-4 space-y-2">
                <p class="text-[10px] text-[var(--dd-blue)] font-medium px-1">Suggested for you:</p>
                <div class="flex flex-wrap gap-2">
                    <button (click)="sendMessage('How to register?')"
                        class="px-3 py-1.5 rounded-full bg-[var(--dd-cream)] dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-[10px] font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors shadow-sm">
                        How to register?
                    </button>
                    <button (click)="sendMessage('Active competitions')"
                        class="px-3 py-1.5 rounded-full bg-[var(--dd-cream)] dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-[10px] font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors shadow-sm">
                        Active competitions
                    </button>
                    <button (click)="sendMessage('Pricing plans')"
                        class="px-3 py-1.5 rounded-full bg-[var(--dd-cream)] dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-[10px] font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors shadow-sm">
                        Pricing plans
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer Input -->
        <div
            class="p-4 border-t border-gray-100 dark:border-gray-800 bg-[var(--dd-blue)]/10 dark:bg-black/50 backdrop-blur-md">
            <div class="relative">
                <input type="text" placeholder="Ask anything about ProveIt..." [(ngModel)]="userInput"
                    (keydown)="handleKeyPress($event)" [disabled]="isLoading()" autocomplete="off"
                    class="w-full pl-4 pr-10 py-3.5 rounded-xl border border-[var(--dd-blue)]/20 dark:border-gray-700 bg-white dark:bg-gray-900 text-xs focus:ring-2 focus:ring-[var(--dd-blue)]/50 focus:border-[var(--dd-blue)]/30 outline-none transition-all dark:text-gray-200">
                <button (click)="sendMessage()" [disabled]="isLoading() || !userInput.trim()"
                    class="absolute right-2 top-1.5 p-1.5 rounded-lg bg-[var(--dd-blue)] text-white hover:bg-[var(--dd-blue)]/80 transition-colors shadow-lg shadow-[var(--dd-blue)]/50 dark:shadow-none disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <div class="mt-2 text-center">
                <p class="text-[9px] text-[var(--dd-blue)]">Powered by ProveIt Advanced AI</p>
            </div>
        </div>
    </div>
</ng-container>
