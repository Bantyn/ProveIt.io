<!-- ====== PREMIUM DASHBOARD SHELL ====== -->
<div
  class="flex h-screen overflow-hidden bg-white dark:bg-neutral-950 font-sans selection:bg-(--dd-blue-light) selection:text-(--dd-blue-dark) transition-colors duration-500">

  <!-- ── ACETERNITY-STYLE SIDEBAR ──────────────────────────────── -->
  <app-sidebar (openChange)="sidebarOpen = $event">
    <app-sidebar-body class="justify-between">

      <!-- Top Section: Logo & Nav -->
      <div class="flex flex-col flex-1 overflow-y-auto overflow-x-hidden pt-2 scrollbar-hide" data-lenis-prevent>
        <!-- Logo Header -->
        <div class="mb-10 px-2 min-h-[40px] flex items-center">
            <ng-container *ngIf="role === 'company' || role === 'admin'; else defaultSidebarLogo">
              <a [routerLink]="role === 'company' ? '/company/dashboard/home' : '/admin/overview'" class="flex items-center gap-3 px-1 py-1 no-underline group">
                <div class="h-10 w-10 rounded-2xl border border-neutral-200 bg-white shadow-sm shrink-0 overflow-hidden flex items-center justify-center">
                  <img *ngIf="companyLogoUrl" [src]="companyLogoUrl" [alt]="getSidebarTitle()" class="h-full w-full object-cover">
                  <ng-container *ngIf="!companyLogoUrl">
                    <img src="assets/logo/favicon_light.ico" [alt]="getSidebarTitle()" class="block h-6 w-6 object-contain dark:hidden">
                    <img src="assets/logo/favicon_dark.ico" [alt]="getSidebarTitle()" class="hidden h-6 w-6 object-contain dark:block">
                  </ng-container>
                </div>
                <div
                  class="transition-all duration-500"
                  [class.opacity-0]="!sidebarOpen"
                  [class.translate-x-[-20px]]="!sidebarOpen">
                  <p class="text-[15px] font-bold text-slate-900 whitespace-nowrap">
                    {{ getSidebarTitle() }}
                  </p>
                  <p class="text-[11px] font-medium text-neutral-400 whitespace-nowrap">{{ getSidebarSubtitle() }}</p>
                </div>
              </a>
            </ng-container>
            <ng-template #defaultSidebarLogo>
              <app-logo [collapsed]="!sidebarOpen"></app-logo>
            </ng-template>
        </div>

        <!-- Navigation Links -->
        <div class="flex flex-col gap-1">
          <app-sidebar-link *ngFor="let item of visibleNavItems" [link]="{ 
              label: item.label, 
              href: item.route, 
              icon: getLucideIcon(item.icon), 
              badge: (item.label === 'Notifications' ? unreadNotifsCount : item.badge) 
            }">
          </app-sidebar-link>
        </div>
      </div>

      <!-- Bottom Section: User & Logout -->
      <div class="mt-auto pt-6 border-t border-neutral-200/50 dark:border-neutral-800/50">
        <button (click)="logout()"
          class="flex items-center justify-start gap-4 px-3.5 py-3 rounded-2xl transition-all duration-300 hover:bg-(--dd-red)/10 cursor-pointer text-(--dd-red) no-underline mt-1 w-full border-none bg-transparent group/logout relative overflow-hidden">
          <div
            class="absolute inset-0 bg-linear-to-r from-(--dd-red)/10 to-transparent opacity-0 group-hover/logout:opacity-100 transition-opacity">
          </div>
          <div
            class="shrink-0 w-6 h-6 flex items-center justify-center relative z-10 group-hover/logout:scale-110 transition-transform">
            <lucide-icon name="log-out" class="w-5 h-5"></lucide-icon>
          </div>
          <span *ngIf="sidebarOpen"
            class="text-[14px] font-semibold whitespace-nowrap animate-in fade-in slide-in-from-left-2 duration-300 relative z-10">
            Sign Out
          </span>
        </button>
      </div>
    </app-sidebar-body>
  </app-sidebar>

  <!-- ── MAIN CONTENT AREA ────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col min-w-0 bg-neutral-50/50 dark:bg-neutral-900/20 backdrop-blur-3xl overflow-hidden">

    <!-- Topbar Navigation -->
    <header
      class="h-20 flex items-center justify-between px-8 border-b border-neutral-200/50 dark:border-neutral-800/50 bg-white/70 dark:bg-neutral-950/70 backdrop-blur-xl z-30 sticky top-0">
      <div class="flex items-center gap-4">
        <!-- Mobile Menu Toggle -->
        <button (click)="sidebarBody.toggleMobile()"
          class="md:hidden p-2.5 rounded-xl hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-all">
          <lucide-icon name="menu" class="w-6 h-6 text-neutral-600 dark:text-neutral-400"></lucide-icon>
        </button>

        <h2 class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">
          {{ getRoleBadge() }} <span class="text-neutral-400 font-medium">Dashboard</span>
        </h2>
      </div>

      <div class="flex items-center gap-6">
        <!-- Search -->
        <div
          class="hidden lg:flex items-center px-4 py-2 bg-neutral-100 dark:bg-neutral-900 rounded-full border border-neutral-200/10 focus-within:ring-2 ring-(--dd-blue)/20 transition-all w-64 group">
          <lucide-icon name="search"
            class="w-4 h-4 text-neutral-400 group-focus-within:text-purple-500 transition-colors"></lucide-icon>
          <input type="text" placeholder="Global search..."
            class="bg-transparent border-none outline-none text-xs ml-2 w-full dark:text-white placeholder:text-neutral-500" />
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3">
          <!-- Notifs -->
          <button (click)="toggleNotif()"
            class="p-2.5 rounded-xl hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-all relative group">
            <lucide-icon name="bell"
              class="w-5 h-5 text-neutral-600 dark:text-neutral-400 group-hover:text-(--dd-blue) transition-colors"></lucide-icon>
            <span *ngIf="unreadNotifsCount > 0"
              class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-(--dd-red) text-white text-[10px] font-bold flex items-center justify-center shadow-sm">
              {{ unreadNotifsCount > 9 ? '9+' : unreadNotifsCount }}
            </span>
          </button>

          <!-- Profile -->
          <button (click)="toggleProfile()"
            class="flex items-center gap-3 p-1.5 pr-4 rounded-full hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-all border border-transparent hover:border-neutral-200/50 dark:hover:border-neutral-700/50">
            <img *ngIf="companyLogoUrl || userAvatarUrl" [src]="companyLogoUrl || userAvatarUrl" class="w-9 h-9 rounded-full object-cover shadow-lg shadow-(--dd-blue)/20" alt="">
            <div *ngIf="!companyLogoUrl && !userAvatarUrl"
              class="w-9 h-9 rounded-full bg-linear-to-tr from-(--dd-blue) to-(--dd-blue-dark) flex items-center justify-center text-white font-semibold text-xs shadow-lg shadow-(--dd-blue)/20">
              {{ userInitials }}
            </div>
            <div class="hidden xl:block text-left">
              <p class="text-[13px] font-semibold text-slate-900 dark:text-white leading-tight">{{ userName }}</p>
              <p class="text-[12px] font-medium text-neutral-400 leading-tight">{{ getRoleBadge() }}</p>
            </div>
            <lucide-icon name="arrow-left" class="w-3 h-3 text-neutral-400 -rotate-90 ml-1"></lucide-icon>
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-6 md:p-8 overflow-y-auto overflow-x-hidden scrollbar-hide" data-lenis-prevent>
      <div class="max-w-full mx-auto animate-in fade-in slide-in-from-bottom-4 duration-700">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- AI Assistant button removed -->
  </div>

  <!-- ── OVERLAYS (NOTIFICATIONS & PROFILE) ────────────────── -->
  <!-- Simplified implementations for the sake of the UI demo -->
  <div *ngIf="notifOpen" (click)="toggleNotif()"
    class="fixed inset-0 bg-neutral-900/20 backdrop-blur-sm z-100 animate-in fade-in duration-300">
    <div (click)="$event.stopPropagation()"
      class="absolute top-24 right-8 w-80 bg-white dark:bg-neutral-950 rounded-3xl shadow-2xl border border-neutral-200/50 dark:border-neutral-800/50 p-6 animate-in zoom-in-95 duration-200">
      <h3 class="text-sm font-semibold mb-4 flex items-center justify-between">
        Notifications
        <span
          class="text-[10px] bg-(--dd-blue-light)/30 text-(--dd-blue) px-2 py-0.5 rounded-full font-bold">{{ unreadNotifsCount }} unread</span>
      </h3>
      <div class="space-y-3">
        <div *ngFor="let n of previewNotifications"
          class="p-3 bg-neutral-50 dark:bg-neutral-900 rounded-2xl border border-neutral-100 dark:border-neutral-800 transition-all hover:translate-x-1">
          <p class="text-[11px] font-bold uppercase tracking-[0.14em] text-neutral-400 mb-1">{{ n.title }}</p>
          <p class="text-xs font-semibold text-slate-800 dark:text-neutral-200">{{ n.message }}</p>
          <p class="text-[10px] text-neutral-400 mt-1">{{ (n.createdAt || n.timestamp) | date:'MMM d, h:mm a' }}</p>
        </div>
        <div *ngIf="previewNotifications.length === 0"
          class="p-4 bg-neutral-50 dark:bg-neutral-900 rounded-2xl border border-dashed border-neutral-200 dark:border-neutral-800 text-center">
          <p class="text-xs font-semibold text-slate-500 dark:text-neutral-300">No notifications yet</p>
        </div>
      </div>
    </div>
  </div>

</div>
