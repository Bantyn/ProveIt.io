<div 
  #container
  class="slide-button-container relative flex h-10 items-center justify-center rounded-full bg-slate-100 transition-all duration-500 ease-[cubic-bezier(0.175,0.885,0.32,1.275)] shadow-inner"
  [style.width]="containerWidth"
  [ngClass]="className"
>
  <!-- Highlight Background -->
  <div 
    class="absolute inset-y-0 left-0 bg-(--dd-blue-dark) rounded-full opacity-10 transition-all duration-300"
    [style.width.px]="completed ? 0 : dragX + 40"
    *ngIf="!completed"
  ></div>

  <!-- Main Interaction Layer -->
  <div class="relative w-full h-full flex items-center px-1">
    
    <!-- Draggable Handle -->
    <div 
      #handle
      class="absolute z-20 flex cursor-grab items-center justify-center active:cursor-grabbing transition-transform duration-200"
      [style.transform]="completed ? 'none' : 'translateX(' + dragX + 'px)'"
      [ngClass]="{ 'scale-105': isDragging && !completed, 'hidden': completed }"
    >
      <button 
        class="h-9 w-9 rounded-full bg-(--dd-blue-dark) text-white shadow-lg flex items-center justify-center border-none outline-none disabled:opacity-50"
        [disabled]="status === 'loading'"
      >
        <lucide-icon [name]="icons.send" class="size-4"></lucide-icon>
      </button>
    </div>

    <!-- Status indicator (Full width button when completed) -->
    <button 
      *ngIf="completed"
      class="absolute inset-0 flex h-full w-full items-center justify-center rounded-full bg-(--dd-blue-dark) text-white border-none outline-none animate-in fade-in zoom-in duration-300"
    >
      <lucide-icon *ngIf="status === 'loading'" [name]="icons.loading" class="animate-spin size-5"></lucide-icon>
      <lucide-icon *ngIf="status === 'success'" [name]="icons.success" class="size-5"></lucide-icon>
      <lucide-icon *ngIf="status === 'error'" [name]="icons.error" class="size-5"></lucide-icon>
    </button>

    <!-- Placeholder Text -->
    <span 
      class="w-full text-center text-sm font-medium text-slate-400 select-none pointer-events-none transition-opacity duration-300"
      [style.opacity]="completed ? 0 : 1 - (progress / 100)"
    >
      {{ text }}
    </span>

  </div>
</div>
