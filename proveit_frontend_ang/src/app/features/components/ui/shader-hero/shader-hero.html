<div class="relative w-full flex items-center justify-center overflow-hidden bg-(--dd-cream) dark:bg-black" [style.min-height]="minHeight">
  <!-- Gradient Blobs -->
  <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/[0.05] via-transparent to-rose-500/[0.05] blur-3xl opacity-50 dark:opacity-100"></div>

  <!-- Geometric Shapes -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div *ngFor="let data of shapesData; let i = index" 
         #shape
         class="absolute" 
         [ngClass]="data.className">
      <div class="shape-inner relative" 
           [style.width.px]="data.width" 
           [style.height.px]="data.height">
        <div class="absolute inset-0 rounded-full bg-gradient-to-r to-transparent backdrop-blur-[2px] border-2 border-slate-300/60 dark:border-white/[0.15] shadow-[0_8px_32px_0_rgba(0,0,0,0.08)] dark:shadow-[0_8px_32px_0_rgba(255,255,255,0.1)] after:absolute after:inset-0 after:rounded-full after:bg-[radial-gradient(circle_at_50%_50%,rgba(255,255,255,0.2),transparent_70%)]"
             [ngClass]="data.gradient">
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="relative z-10 container mx-auto px-4 md:px-6">
    <div class="max-w-4xl mx-auto text-center">
      

      <!-- Title -->
      <div #fadeUp>
        <h1 class="text-4xl sm:text-6xl md:text-8xl font-bold mb-6 md:mb-8 tracking-tight">
          <span class="bg-clip-text text-transparent bg-gradient-to-b from-slate-900 to-slate-700 dark:from-white dark:to-white/80">
            {{ title1 }}
          </span>
          <br />
          <span class="bg-clip-text text-transparent bg-gradient-to-r from-(--dd-blue-dark) via-(--dd-blue) to-(--dd-blue-light) dark:from-(--dd-blue-dark) dark:via-(--dd-blue) dark:to-(--dd-blue-light)">
            {{ title2 }}
          </span>
        </h1>
      </div>

      <!-- Description -->
      <div #fadeUp>
        <p class="text-base sm:text-lg md:text-xl text-slate-500 dark:text-white/40 mb-8 leading-relaxed font-light tracking-wide max-w-2xl mx-auto px-4">
          {{ description }}
        </p>
      </div>

      <!-- Content Projection (for buttons etc.) -->
      <div #fadeUp>
        <ng-content></ng-content>
      </div>
    </div>
  </div>

  <!-- Bottom Gradient Fade -->
  <div class="absolute inset-0 bg-gradient-to-t from-(--dd-cream) dark:from-black via-transparent to-(--dd-cream)/80 dark:to-black/80 pointer-events-none"></div>
</div>
