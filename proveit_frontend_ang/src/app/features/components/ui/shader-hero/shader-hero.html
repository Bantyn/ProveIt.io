<div class="shader-hero" [style.min-height]="minHeight">
  <!-- Shader background -->
  <div #shaderContainer class="shader-bg"></div>

  <!-- Subtle vignette overlay -->
  <div class="shader-overlay"></div>

  <!-- Bottom fade — blends hero into page background -->
  <div class="shader-bottom-fade"></div>

  <!-- Projected content (navbar etc.) — sits directly in the hero container -->
  <ng-content></ng-content>

  <!-- Centered text content -->
  <div class="shader-content">
    <div *ngIf="title" class="shader-text">
      <div
        class="inline-flex items-center px-4 py-1.5 rounded-full bg-white/10 backdrop-blur-md mb-6 border border-white/10">
        <span class="text-white/90 text-xs font-medium tracking-wide">✨ ProveIt.io</span>
      </div>

      <h1 class="text-4xl md:text-7xl leading-tight tracking-tight text-white mb-5 font-bold">
        {{ title }}
      </h1>

      <p *ngIf="subtitle" class="text-sm md:text-lg font-light text-white/70 mb-8 leading-relaxed max-w-2xl">
        {{ subtitle }}
      </p>
    </div>
  </div>
</div>
